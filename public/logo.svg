<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
  <!--
    ArtRef 로고
    'a'를 돋보기 형태로 표현: 원형 렌즈 + 대각선 손잡이
    메인 컬러: orange-600 (#ea580c)
  -->

  <!-- 'a' = 돋보기 -->
  <g>
    <!-- 돋보기 렌즈 (원) -->
    <circle cx="16" cy="18" r="11" stroke="#ea580c" stroke-width="3.5" fill="none"/>
    <!-- 렌즈 안의 'a' 레터폼 -->
    <text x="16" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#ea580c">a</text>
    <!-- 돋보기 손잡이 -->
    <line x1="24" y1="26" x2="32" y2="36" stroke="#ea580c" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- 'rtRef' 텍스트 -->
  <text x="36" y="30" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="26" fill="#1a1a1a" letter-spacing="-0.5">rtRef</text>
</svg>
